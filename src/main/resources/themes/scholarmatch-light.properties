#
# ScholarMatch FlatLaf theme — white + teal-green academic-platform palette:
# white cards on a soft gray page background, brand teal accent (#128066).
#
@baseTheme = light
@background = #f6f8f8
@foreground = #1c2624
@disabledForeground = #8c959f
@accentColor = #128066
@componentBackground = #ffffff
@buttonBackground = #f6f8f8
@menuBackground = #ffffff
@selectionBackground = #128066
@selectionForeground = #ffffff

Component.arc = 8
Button.arc = 8
CheckBox.arc = 4
TextComponent.arc = 8
ProgressBar.arc = 8

Component.borderColor = #d8dedc
Component.focusColor = #128066
Component.focusedBorderColor = #128066
Component.innerFocusWidth = 0
Component.focusWidth = 1

TextField.background = #ffffff
PasswordField.background = #ffffff
TextArea.background = #ffffff
ComboBox.background = #ffffff
List.background = #ffffff
List.selectionBackground = #128066
List.selectionForeground = #ffffff
ScrollPane.background = #f6f8f8
Table.background = #ffffff
Viewport.background = #f6f8f8

TabbedPane.background = #f6f8f8
